<!DOCTYPE html>

<html lang="en-US">
  <head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>To Do Items</title>
  <meta name="description" content"">
  <meta name="viewport" content="width=device-width," intial-scale=1>
  <link rel="stylesheet" href="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">


  <style>
    body{
        background-color: #e8fdff;
        font-family: "Nunito", sans-serif;
        padding-top: 200px;
        

    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
       {
      font-family: 'Raleway', sans-serif;
      }
    

    a,
    p {
      color: #4b5156;
    }  

    .container{
      max-width: 680px;
      margin: auto;
      background-color: #fff;
      
      box-shadow: 2px 2px 13px -4px rgba(0, 0, 0, 0.21);
    }

    .header-bar{
      display:flex;
      justify-content: space-between;
      color: #fff;
      padding: 10px;
      border-radius: 5px 5px 0 0;
      background: linear-gradient(90deg, #4dafcd 0%, #4dafcd 43%, #4dafcd 100%);
    }

    .header-bar a {
      color: rgb(247, 247, 247);
      text-decoration: none;
    }

    .task-wrapper{
      display: flex;
      align-items:center;
      justify-content: space-between;
      padding: 20px;
      background-color: #fff;
      border-top: 1px solid rgb(226, 226, 226);
    }
    .task-actions{
      display: flex;
      align-items: center;
      gap: 6px; /* controls spacing between Edit and Delete */
        
    }

     .task-title {
            display: flex;
            padding: 20px;
        }

        .task-title a {
            text-decoration: none;
            color: #4b5156;
            margin-left: 10px;
        }

        .task-complete-icon {
            height: 20px;
            width: 20px;
            background-color: rgb(105, 192, 105);
            border-radius: 50%;
        }

        .task-incomplete-icon {
            height: 20px;
            width: 20px;
            background-color: rgb(218, 218, 218);
            border-radius: 50%;
        }

        .delete-link {
            text-decoration: none;
            font-weight: 900;
            color: #4dafcd;
            font-size: 22px;
            line-height: 0;
            padding: 20px 0px;
        }

        #search-add-wrapper {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 10px;
        }


       #add-link,
         .delete-link {
          color: #e83c39;
          text-decoration: none;
          font-size: 42px;
          text-shadow: 1px 1px #81413b;
        }
        input[type=text],
        input[type=password],
        textarea {
            border: 1px solid #757575;
            border-radius: 5px;
            padding: 10px;
            width: 90%;
        }

        .btn {
            border: 1px solid #757575;
            background-color: #FFF;
            color: #1B1212;
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            margin: 0;
        }
        
        .edit-button
        {
            border: 1px solid #757575;
            background-color: #FFF;
            color: #1B1212;
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            margin: 0;
        }

        .delete-button{
          border: 1px solid #757575;
            background-color: #FFF;
            color: #ce1212;
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            margin: 0;
        }
        
        label {
            padding-top: 10px !important;
            display: block;
        }

        .card-body {
          padding: 20px;
        }

        @media (max-width: 480px) {
       
       #add-task {
        
        padding-right: 10px
        text-align: center;
          }
       }

     <style>
    #message-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
       max-width: 300px; /* optional: controls width */
       text-align: center;
    }

    .alert {
        padding: 10px 15px;
        margin-bottom: 10px;
        border-radius: 4px;
        opacity: 1;
        transition: opacity 1s ease-out;
      
        
    }

    .alert.success { background: #d4edda; color: #155724; }
    .alert.error { background: #f8d7da; color: #721c24; }
    .alert.warning { background: #fff3cd; color: #856404; }
    .alert.info { background: #d1ecf1; color: #0c5460; }
</style>

  </style>
 
  </head>
  <body>
   <main>
{% if messages %}
<div id="message-container">
    {% for message in messages %}
        <div class="alert {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}
   
    <div class="container">
         {% block content%}
         

        {% endblock content %}
    </div>

  </main> 
  </body>
  <script>
    setTimeout(function() {
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(alert => {
            alert.style.opacity = '0';
            setTimeout(() => alert.remove(), 1000);
        });
    }, 3000);
</script>

  </html>
